<!DOCTYPE html>

<html lang="uz"><head>

                    "outline": "#6d7a77",

                    "inverse-primary": "#6bd8cb",

                    "container-max-width": "1280px",

                    "margin-mobile": "16px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "h3": ["Plus Jakarta Sans"],

                    "body-md": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #bcc9c6;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md">
<!-- Map Background Simulation (Behind Modal) -->
<main class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A highly detailed 2D map view of a clean, modern city with soft green parks and teal-colored water bodies. The map features minimal UI markers and pins indicating veterinary locations across a wide metropolitan area. The lighting is bright and even, simulating a sunny day with a professional, clinical healthcare aesthetic and a soft, calming color palette of mint and grey." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB4tsHsNevIxd4qBH-nT4WBYYWaXU112EGWr9kE4fS4LC9pK7zaRwBz63j7BgthihIbwxd6knZJbqoQr_5n0gexZTSXJ3UdKgAJGN16oVbIM1x9dkt2Hu_59GtSPxCBOx6t8hZ-Jb-AWCnzrS7qDU5Tw2u2ITGCsy2E3MGtb-t2gj7_AEk987eexGZCnygY50nME2sptlmKBBafDMhiLPQK3mTBipr3JMmrOTOOTq2MPuB86ipWv6ryu9RJbkzwGERhGH8_jscA0P8')"></div>
<div class="absolute inset-0 bg-on-background/20 backdrop-blur-[2px]"></div>
</main>
<!-- Mobile Filter Modal Overlay -->
<div class="fixed inset-0 z-50 flex flex-col bg-surface-container-lowest/95 md:max-w-md md:mx-auto md:shadow-2xl">
<!-- Header -->
<header class="flex items-center justify-between px-margin-mobile py-4 bg-surface-container-lowest border-b border-outline-variant sticky top-0 z-10">
<div class="flex items-center gap-3">
<button class="p-2 -ml-2 text-on-surface-variant hover:bg-surface-container transition-colors rounded-full">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="font-h3 text-h3 text-on-surface">Filtrlar</h2>
</div>
<button class="font-label-caps text-primary uppercase tracking-wider">Tozalash</button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto custom-scrollbar px-margin-mobile py-6 space-y-10 pb-32">
<!-- Shahar (Multi-select) -->
<section>
<h3 class="font-h3 text-body-lg font-bold mb-4">Shahar</h3>
<div class="grid grid-cols-2 gap-3">
<label class="flex items-center p-3 rounded-xl border border-outline-variant bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all">
<input checked="" class="w-5 h-5 rounded border-outline text-primary focus:ring-primary" type="checkbox"/>
<span class="ml-3 font-body-md text-on-surface">Toshkent</span>
</label>
<label class="flex items-center p-3 rounded-xl border border-outline-variant bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary" type="checkbox"/>
<span class="ml-3 font-body-md text-on-surface">Samarqand</span>
</label>
<label class="flex items-center p-3 rounded-xl border border-outline-variant bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary" type="checkbox"/>
<span class="ml-3 font-body-md text-on-surface">Buxoro</span>
</label>
<label class="flex items-center p-3 rounded-xl border border-outline-variant bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all">
<input class="w-5 h-5 rounded border-outline text-primary focus:ring-primary" type="checkbox"/>
<span class="ml-3 font-body-md text-on-surface">Andijon</span>
</label>
</div>
</section>
<!-- Holat (Toggle) -->
<section class="flex items-center justify-between p-4 bg-primary-container/10 rounded-xl border border-primary/20">
<div>
<h3 class="font-h3 text-body-lg font-bold">Holat</h3>
<p class="font-body-sm text-on-surface-variant">Faqat hozirda ochiq klinikalar</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</section>
<!-- Masofa (Slider) -->
<section>
<div class="flex justify-between items-center mb-4">
<h3 class="font-h3 text-body-lg font-bold">Masofa</h3>
<span class="font-body-sm font-semibold text-primary px-3 py-1 bg-primary/10 rounded-full">15 km gacha</span>
</div>
<div class="relative w-full h-6 flex items-center">
<input class="w-full h-2 bg-surface-container-high rounded-lg appearance-none cursor-pointer accent-primary" max="50" min="1" type="range" value="15"/>
</div>
<div class="flex justify-between mt-2 font-body-sm text-on-surface-variant">
<span>1 km</span>
<span>50 km</span>
</div>
</section>
<!-- Reyting (Star selection) -->
<section>
<h3 class="font-h3 text-body-lg font-bold mb-4">Reyting</h3>
<div class="flex gap-2">
<button class="flex-1 flex items-center justify-center gap-1 py-3 px-2 rounded-lg border border-outline-variant hover:border-secondary-container transition-all">
<span class="font-body-sm font-bold">3+</span>
<span class="material-symbols-outlined text-secondary-container scale-75" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="flex-1 flex items-center justify-center gap-1 py-3 px-2 rounded-lg border-2 border-secondary-container bg-secondary-container/5 font-bold text-on-background">
<span class="font-body-sm">4+</span>
<span class="material-symbols-outlined text-secondary-container scale-75" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="flex-1 flex items-center justify-center gap-1 py-3 px-2 rounded-lg border border-outline-variant hover:border-secondary-container transition-all">
<span class="font-body-sm font-bold">4.5+</span>
<span class="material-symbols-outlined text-secondary-container scale-75" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="flex-1 flex items-center justify-center gap-1 py-3 px-2 rounded-lg border border-outline-variant hover:border-secondary-container transition-all">
<span class="font-body-sm font-bold">5</span>
<span class="material-symbols-outlined text-secondary-container scale-75" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
</div>
</section>
<!-- Xizmatlar (Pill chips) -->
<section>
<h3 class="font-h3 text-body-lg font-bold mb-4">Xizmatlar</h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-outline-variant text-body-sm hover:border-primary hover:text-primary transition-all">Vaksinalash</button>
<button class="px-4 py-2 rounded-full bg-primary text-on-primary text-body-sm font-semibold">Jarrohlik</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-body-sm hover:border-primary hover:text-primary transition-all">Uzi</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-body-sm hover:border-primary hover:text-primary transition-all">Stomatologiya</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-body-sm hover:border-primary hover:text-primary transition-all">Laboratoriya</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-body-sm hover:border-primary hover:text-primary transition-all">Gruming</button>
<button class="px-4 py-2 rounded-full border border-outline-variant text-body-sm hover:border-primary hover:text-primary transition-all">Rentgen</button>
</div>
</section>
</div>
<!-- Sticky Footer Action -->
<footer class="p-margin-mobile bg-surface-container-lowest border-t border-outline-variant sticky bottom-0 z-10">
<button class="w-full py-4 bg-secondary-container text-on-secondary font-h3 rounded-xl shadow-lg shadow-secondary-container/20 active:scale-95 transition-all">
                Qo'llash
            </button>
</footer>
</div>
<!-- Background Decorative Elements -->
<div class="fixed bottom-32 left-1/2 -translate-x-1/2 z-10 md:hidden">
<div class="flex items-center gap-2 px-6 py-3 bg-primary text-on-primary rounded-full shadow-xl">
<span class="material-symbols-outlined">map</span>
<span class="font-bold font-label-caps">Xaritada ko'rish</span>
</div>
</div>
</body></html>
