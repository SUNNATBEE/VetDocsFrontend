                          todayHours: { open: '09:00', close: '19:00' }
                          averageRating: 4.5
                          reviewCount: 7
                        - id: clu1xv8z00004abcd1234efgh
                          name: Fargona Pet Care Center
                          phone: '+998 73 244 77 88'
                          address: Al-Farg'oniy ko'chasi, Farg'ona
                          city: Farg'ona
                          latitude: 40.3894
                          longitude: 71.7875
