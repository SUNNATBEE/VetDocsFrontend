                          city: Toshkent
                          latitude: 41.365
                          longitude: 69.292
                          distanceKm: 3.45
                          isOpenNow: true
                          todayHours: { open: '09:00', close: '19:00' }
                          averageRating: 4.4
                          reviewCount: 9
                        - id: clu1xv8z00002abcd1234efgh
                          name: 24/7 Emergency Vet
                          phone: '+998 90 555 12 34'
                          address: Shayxontohur tumani, Toshkent
                          city: Toshkent
                          latitude: 41.315
                          longitude: 69.248
                          distanceKm: 1.06
                          isOpenNow: true
                          todayHours: { open: '00:00', close: '23:59' }
                          averageRating: 4.8
                          reviewCount: 21
                        - id: clu1xv8z00003abcd1234efgh
                          name: Samarqand Vet Markazi
                          phone: '+998 66 222 33 44'
                          address: Registon yo‘nalishi, Samarqand
                          city: Samarqand
                          latitude: 39.6542
                          longitude: 66.9597
