                          isOpenNow: false
                          todayHours: { open: '08:30', close: '18:30' }
                          averageRating: 4.3
                          reviewCount: 5
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /clinics/{id}:
    get:
      tags: [Clinics]
      summary: Klinika tafsilotlari
      description: |
        Bitta klinikaning to'liq ma'lumotini (manzil, telefon, ish vaqti, oxirgi
        50 sharh) qaytaradi. Sharhlardagi `user.email` xavfsizlik uchun maskalanadi
        (masalan, `va***@example.com`).

        ```bash
        curl "$BASE_URL/clinics/CLINIC_ID"
        ```
      operationId: clinicById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Klinika va sharhlar (oxirgi 50 ta).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicDetailEnvelope'
              examples:
                vetServiceDetail:
                  summary: Vet Service Chilonzor detali
                  value:
                    success: true
                    data:
                      id: clu1xv8z00000abcd1234efgh
                      name: Vet Service Chilonzor
                      phone: '+998 71 123 45 67'
                      address: Chilonzor-9, Toshkent
                      city: Toshkent
                      latitude: 41.285
                      longitude: 69.204
                      openingHours:
                        mon: { open: '09:00', close: '19:00' }
                        tue: { open: '09:00', close: '19:00' }
                        wed: { open: '09:00', close: '19:00' }
                        thu: { open: '09:00', close: '19:00' }
                        fri: { open: '09:00', close: '19:00' }
                        sat: { open: '10:00', close: '16:00' }
                        sun: null
                      todayHours: { open: '09:00', close: '19:00' }
                      isOpenNow: true
                      averageRating: 4.5
                      reviewCount: 2
                      reviews:
                        - id: clrev000100001
                          rating: 5
                          comment: Veterinarlar juda e'tiborli, xizmat zo'r.
                          createdAt: '2026-05-06T11:20:00.000Z'
                          user:
                            id: clusr000100001
                            name: Ali Karimov
                            email: al***@vetclinic.uz
                        - id: clrev000100002
                          rating: 4
                          comment: Navbat biroz bo'ldi, lekin davolash yaxshi.
                          createdAt: '2026-05-05T15:10:00.000Z'
                          user:
                            id: clusr000100002
                            name: Dilnoza Raximova
                            email: di***@vetclinic.uz
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /clinics/{id}/reviews:
    post:
      tags: [Clinics]
      summary: Sharh qoldirish (yoki mavjudini yangilash)
      description: |
        Har bir foydalanuvchi bitta klinikaga **bitta** sharh qoldira oladi.
        Qaytadan yuborilsa, oldingi sharh `rating` va `comment` qiymatlariga
        yangilanadi (upsert).

        ```bash
        curl -X POST "$BASE_URL/clinics/CLINIC_ID/reviews" \
          -H "Authorization: Bearer YOUR_ACCESS_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"rating":5,"comment":"Juda yaxshi xizmat"}'
        ```
      operationId: clinicCreateReview
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
      responses:
        '201':
          description: Sharh yaratildi yoki yangilandi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/dashboard:
    get:
      tags: [Admin]
      summary: Boshqaruv statistikasi
      description: |
        Faqat `ADMIN` uchun: `users`, `clinics`, `reviews` sonlari va oxirgi 5 sharh.

        ```bash
        curl "$BASE_URL/admin/dashboard" \
          -H "Authorization: Bearer YOUR_ADMIN_ACCESS_TOKEN"
        ```
      operationId: adminDashboard
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Statistika va oxirgi sharhlar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminDashboardEnvelope' }
              examples:
                ok:
                  summary: Tipik dashboard javobi
                  value:
                    success: true
                    data:
                      counts: { users: 128, clinics: 12, reviews: 84 }
                      latestReviews:
                        - id: clrev0001
                          rating: 5
                          comment: Tez va sifatli xizmat
                          createdAt: '2026-05-05T12:30:00.000Z'
                          clinic: { id: clu1xv8z00000abcd1234efgh, name: Vet Service Chilonzor }
                          user:   { id: clusr0001, email: ali@example.com, name: Ali }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/clinics:
    get:
      tags: [Admin]
      summary: Klinikalar ro'yxati (sahifalashtirilgan)
      description: |
        `page`, `pageSize` va ixtiyoriy `q` (erkin matnli qidiruv —
        `name`, `city`, `address` bo'yicha) bilan filterlanadi.
      operationId: adminListClinics
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Sahifalashtirilgan ro'yxat.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminClinicsListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    post:
      tags: [Admin]
      summary: Yangi klinika yaratish
      description: |
        Kerakli maydonlar: `name`, `phone`, `address`, `city`, `latitude`,
        `longitude`, `openingHours`. `openingHours` to'liq 7 kun bo'lishi shart
        (yopiq kun — `null`).

        ```bash
        curl -X POST "$BASE_URL/admin/clinics" \
          -H "Authorization: Bearer YOUR_ADMIN_ACCESS_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
                "name":"Vet Service",
                "phone":"+998901234567",
                "address":"Chilonzor",
                "city":"Toshkent",
                "latitude":41.285,
                "longitude":69.204,
                "openingHours":{
                  "mon":{"open":"09:00","close":"19:00"},
                  "tue":{"open":"09:00","close":"19:00"},
                  "wed":{"open":"09:00","close":"19:00"},
                  "thu":{"open":"09:00","close":"19:00"},
                  "fri":{"open":"09:00","close":"19:00"},
                  "sat":{"open":"10:00","close":"15:00"},
                  "sun":null
                }
              }'
        ```
      operationId: adminCreateClinic
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminClinicCreateRequest' }
      responses:
        '201':
          description: Klinika yaratildi.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminClinicEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/clinics/{id}:
    get:
      tags: [Admin]
      summary: Klinika ma'lumoti (admin ko'rinish)
      description: ID bo'yicha bitta klinika.
      operationId: adminGetClinic
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Klinika ma'lumoti.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminClinicEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    patch:
      tags: [Admin]
      summary: Klinikani yangilash
      description: |
        Faqat o'zgartirmoqchi bo'lgan maydonlarni yuboring. `openingHours` mavjud
        bo'lsa — to'liq qayta yoziladi (kun-kun merge qilinmaydi).

        ```bash
        curl -X PATCH "$BASE_URL/admin/clinics/CLINIC_ID" \
          -H "Authorization: Bearer YOUR_ADMIN_ACCESS_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"phone":"+998901112233"}'
        ```
      operationId: adminUpdateClinic
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminClinicUpdateRequest' }
      responses:
        '200':
          description: Yangilangan klinika.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminClinicEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
    delete:
      tags: [Admin]
      summary: Klinikani o'chirish
      description: |
        Klinikani va unga tegishli sharhlarni (cascade) o'chiradi.

        ```bash
        curl -X DELETE "$BASE_URL/admin/clinics/CLINIC_ID" \
          -H "Authorization: Bearer YOUR_ADMIN_ACCESS_TOKEN"
        ```
      operationId: adminDeleteClinic
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: O'chirildi.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/reviews:
    get:
      tags: [Admin]
      summary: Sharhlar ro'yxati
      description: |
        `q` qidiruvi `comment`, `clinic.name`, `user.email` bo'yicha ishlaydi.
      operationId: adminListReviews
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Sahifalashtirilgan ro'yxat.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminReviewsListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/reviews/{id}:
    delete:
      tags: [Admin]
      summary: Sharhni o'chirish
      description: |
        Moderatsiya — admin bitta sharhni o'chirib tashlaydi. Foydalanuvchi
        o'zining sharhini o'chira olmaydi (siyosat).
      operationId: adminDeleteReview
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: O'chirildi.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/users:
    get:
      tags: [Admin]
      summary: Foydalanuvchilar ro'yxati
      description: |
        `q` qidiruvi `email`, `name` bo'yicha ishlaydi.
      operationId: adminListUsers
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Sahifalashtirilgan ro'yxat.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUsersListEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/users/{id}/role:
    patch:
      tags: [Admin]
      summary: Foydalanuvchi rolini o'zgartirish
      description: |
        `USER` <-> `ADMIN` o'zaro almashtirish. Self-protection:

        - O'zingizdan `ADMIN` rolini olib tashlay olmaysiz -> `400 CANNOT_DEMOTE_SELF`.

        ```bash
        curl -X PATCH "$BASE_URL/admin/users/USER_ID/role" \
          -H "Authorization: Bearer YOUR_ADMIN_ACCESS_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"role":"ADMIN"}'
        ```
      operationId: adminUpdateUserRole
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminUserRoleUpdateRequest' }
      responses:
        '200':
          description: Yangilangan foydalanuvchi.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUserEnvelope' }
        '400':
          description: Validatsiya yoki self-protection xatosi.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                cannotDemoteSelf:
                  summary: Admin o'zini demote qilmoqchi
                  value:
                    success: false
                    error:
                      code: CANNOT_DEMOTE_SELF
                      message: O'zingizdan ADMIN rolini olib tashlay olmaysiz
                    meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
                validation:
                  summary: Noto'g'ri rol qiymati
                  value:
                    success: false
                    error:
                      code: VALIDATION_ERROR
                      message: Validatsiya xatosi
                      details:
                        fieldErrors:
                          role: ["USER yoki ADMIN bo'lishi kerak"]
                    meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /admin/users/{id}:
    delete:
      tags: [Admin]
      summary: Foydalanuvchini o'chirish
      description: |
        Foydalanuvchi va uning sharhlari/refresh tokenlari cascade tarzida
        o'chiriladi. Self-protection: o'zingizni o'chira olmaysiz ->
        `400 CANNOT_DELETE_SELF`.
      operationId: adminDeleteUser
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: O'chirildi.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkEnvelope' }
        '400':
          description: Self-protection xatosi.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                cannotDeleteSelf:
                  summary: Admin o'zini o'chirmoqchi
                  value:
                    success: false
                    error:
                      code: CANNOT_DELETE_SELF
                      message: O'zingizni o'chira olmaysiz
                    meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

components:
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      description: Resurs ID (cuid).
      schema:
        type: string
        minLength: 1
        maxLength: 64
      example: clu1xv8z00000abcd1234efgh

    Page:
      in: query
      name: page
      required: false
      description: Sahifa raqami (1 dan boshlanadi).
      schema: { type: integer, minimum: 1, default: 1 }
      example: 1

    PageSize:
      in: query
      name: pageSize
      required: false
      description: Sahifa hajmi (1..100).
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      example: 20

    Search:
      in: query
      name: q
      required: false
      description: Erkin matnli qidiruv (1..120 belgi).
      schema: { type: string, minLength: 1, maxLength: 120 }
      example: chilonzor

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Login yoki Refresh javobidan olingan `accessToken` ni yuboring:
        `Authorization: Bearer <accessToken>`

  examples:
    AuthTokensExample:
      summary: Tipik auth javobi
      value:
        success: true
        data:
          user:
            id: clusr0001
            email: vet@example.com
            name: Akmal
          accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          refreshToken: 3b2f5c7e9a8b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d

  responses:
    BadRequest:
      description: Validatsiya yoki noto'g'ri so'rov.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            validation:
              summary: Zod validatsiya xatosi
              value:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Validatsiya xatosi
                  details:
                    fieldErrors:
                      email: ["Email noto'g'ri formatda"]
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
            invalidJson:
              summary: Buzilgan JSON tanasi
              value:
                success: false
                error: { code: INVALID_JSON, message: "JSON tanasi noto'g'ri" }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }

    Unauthorized:
      description: Token yo'q, yaroqsiz yoki muddati tugagan.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            missing:
              summary: Authorization sarlavhasi yo'q
              value:
                success: false
                error: { code: UNAUTHORIZED, message: Autentifikatsiya talab qilinadi }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
            expired:
              summary: Access token muddati tugagan
              value:
                success: false
                error: { code: TOKEN_EXPIRED, message: Access token muddati tugagan }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
            invalid:
              summary: Yaroqsiz token
              value:
                success: false
                error: { code: INVALID_TOKEN, message: Token yaroqsiz }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
            invalidCredentials:
              summary: Login uchun email/parol noto'g'ri
              value:
                success: false
                error: { code: INVALID_CREDENTIALS, message: "Email yoki parol noto'g'ri" }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }

    Forbidden:
      description: Ruxsat yo'q (rol yetarli emas).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            roleRequired:
              summary: ADMIN roli talab qilinadi
              value:
                success: false
                error: { code: FORBIDDEN, message: "Ushbu amal uchun ruxsat yo'q" }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }

    NotFound:
      description: Resurs topilmadi.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            clinicNotFound:
              summary: Klinika topilmadi
              value:
                success: false
                error: { code: CLINIC_NOT_FOUND, message: Klinika topilmadi }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
            userNotFound:
              summary: Foydalanuvchi topilmadi
              value:
                success: false
                error: { code: USER_NOT_FOUND, message: Foydalanuvchi topilmadi }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
            reviewNotFound:
              summary: Sharh topilmadi
              value:
                success: false
                error: { code: REVIEW_NOT_FOUND, message: Sharh topilmadi }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }

    Conflict:
      description: Konflikt (masalan, email band).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            emailExists:
              summary: Email band
              value:
                success: false
                error:
                  code: EMAIL_EXISTS
                  message: "Bunday email allaqachon ro'yxatdan o'tgan"
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }

    PayloadTooLarge:
      description: So'rov tanasi limitidan oshib ketdi (1 MB).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            tooLarge:
              value:
                success: false
                error: { code: PAYLOAD_TOO_LARGE, message: "So'rov tanasi juda katta" }
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }

    TooManyRequests:
      description: Rate limit oshib ketdi.
      headers:
        RateLimit-Limit:
          description: Oynadagi maksimal so'rovlar soni.
          schema: { type: integer }
        RateLimit-Remaining:
          description: Joriy oynada qolgan so'rovlar soni.
          schema: { type: integer }
        RateLimit-Reset:
          description: Oynaning tugashigacha qolgan soniya.
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            global:
              summary: Global limit
              value:
                success: false
                error:
                  code: RATE_LIMIT
                  message: "Juda ko'p so'rov yuborildi, biroz kuting"
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
            auth:
              summary: Auth uchun alohida limit
              value:
                success: false
                error:
                  code: AUTH_RATE_LIMIT
                  message: "Juda ko'p urinish, keyinroq urinib ko'ring"
                meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }

  schemas:
    Meta:
      type: object
      properties:
        requestId:
          type: string
          nullable: true
          description: So'rov bilan bog'liq UUID v4. Loglarda ham shu ID ishlatiladi.
          example: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc

    ErrorResponse:
      type: object
      required: [success, error, meta]
      properties:
        success:
          type: boolean
          enum: [false]
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Mashinaga o'qiladigan xato kodi. Mumkin bo'lgan qiymatlar:

                - **Validatsiya/so'rov:** `VALIDATION_ERROR`, `INVALID_JSON`, `PAYLOAD_TOO_LARGE`, `BAD_REQUEST`
                - **Auth:** `UNAUTHORIZED`, `INVALID_TOKEN`, `TOKEN_EXPIRED`, `INVALID_CREDENTIALS`,
                  `INVALID_REFRESH`, `REFRESH_REUSED`, `REFRESH_EXPIRED`, `FORBIDDEN`
                - **Self-protection:** `CANNOT_DEMOTE_SELF`, `CANNOT_DELETE_SELF`
                - **Konflikt/topilmadi:** `EMAIL_EXISTS`, `CONFLICT`, `CLINIC_NOT_FOUND`,
                  `USER_NOT_FOUND`, `REVIEW_NOT_FOUND`, `NOT_FOUND`
                - **Rate limit:** `RATE_LIMIT`, `AUTH_RATE_LIMIT`
                - **Server:** `INTERNAL_ERROR`
              example: VALIDATION_ERROR
            message:
              type: string
              description: O'qish uchun mo'ljallangan, foydalanuvchiga ko'rsatish mumkin bo'lgan xabar (Uzbek).
              example: Validatsiya xatosi
            details:
              description: Qo'shimcha tafsilot (masalan, Zod `fieldErrors`).
              nullable: true
        meta: { $ref: '#/components/schemas/Meta' }

    HealthResponse:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true], example: true }
        data:
          type: object
          required: [status, service, version, startedAt, uptimeSec]
          properties:
            status: { type: string, example: ok }
            service: { type: string, example: vet-clinic-api }
            version: { type: string, example: 1.0.0 }
            startedAt: { type: string, format: date-time }
            uptimeSec: { type: integer, example: 1234 }
            docs:
              type: string
              format: uri
              nullable: true
              example: http://localhost:4000/docs

    PublicUser:
      type: object
      required: [id, email]
      properties:
        id: { type: string, example: clusr0001 }
        email: { type: string, format: email, example: vet@example.com }
        name: { type: string, nullable: true, example: Akmal }

    AuthPayload:
      type: object
      required: [user, accessToken, refreshToken]
      properties:
        user: { $ref: '#/components/schemas/PublicUser' }
        accessToken:
          type: string
          description: HS256 JWT, sukut bo'yicha 15 daqiqa amal qiladi.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          minLength: 96
          maxLength: 96
          description: 96 belgi hex string. Server tomonida SHA-256 hash bilan saqlanadi.
          example: 3b2f5c7e9a8b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d

    AuthTokensEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true], example: true }
        data: { $ref: '#/components/schemas/AuthPayload' }

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 254, example: vet@example.com }
        password: { type: string, minLength: 8, maxLength: 128, example: StrongP@ss1 }
        name: { type: string, minLength: 1, maxLength: 120, example: Akmal }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 254, example: vet@example.com }
        password: { type: string, minLength: 1, maxLength: 128, example: StrongP@ss1 }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 20, maxLength: 256 }

    LogoutRequest:
      type: object
      properties:
        refreshToken: { type: string, minLength: 20, maxLength: 256 }

    OkEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true], example: true }
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean, enum: [true], example: true }

    OpeningSlot:
      type: object
      nullable: true
      description: 24-soat formatdagi ish vaqti yoki `null` (yopiq kun).
      required: [open, close]
      properties:
        open:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: '09:00'
        close:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: '19:00'

    OpeningHours:
      type: object
      description: Hafta kunlari bo'yicha ish vaqti (`null` — yopiq kun). Hamma 7 kun majburiy.
      required: [mon, tue, wed, thu, fri, sat, sun]
      properties:
        mon: { $ref: '#/components/schemas/OpeningSlot' }
        tue: { $ref: '#/components/schemas/OpeningSlot' }
        wed: { $ref: '#/components/schemas/OpeningSlot' }
        thu: { $ref: '#/components/schemas/OpeningSlot' }
        fri: { $ref: '#/components/schemas/OpeningSlot' }
        sat: { $ref: '#/components/schemas/OpeningSlot' }
        sun: { $ref: '#/components/schemas/OpeningSlot' }

    ClinicSummary:
      type: object
      properties:
        id: { type: string, example: clu1xv8z00000abcd1234efgh }
        name: { type: string, example: Vet Service Chilonzor }
        phone: { type: string, example: '+998 71 123 45 67' }
        address: { type: string, example: Chilonzor-9, Toshkent }
        city: { type: string, example: Toshkent }
        latitude: { type: number, format: double, example: 41.285 }
        longitude: { type: number, format: double, example: 69.204 }
        distanceKm: { type: number, format: double, example: 1.27 }
        isOpenNow: { type: boolean, example: true }
        todayHours: { $ref: '#/components/schemas/OpeningSlot' }
        averageRating:
          type: number
          format: double
          nullable: true
          minimum: 1
          maximum: 5
          example: 4.6
        reviewCount: { type: integer, minimum: 0, example: 12 }

    ClinicsNearbyEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true], example: true }
        data:
          type: object
          required: [clinics]
          properties:
            clinics:
              type: array
              items: { $ref: '#/components/schemas/ClinicSummary' }

    ClinicDetail:
      type: object
      description: Klinika to'liq ma'lumoti (masofasiz).
      properties:
        id: { type: string }
        name: { type: string }
        phone: { type: string }
        address: { type: string }
        city: { type: string }
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }
        openingHours: { $ref: '#/components/schemas/OpeningHours' }
        todayHours: { $ref: '#/components/schemas/OpeningSlot' }
        isOpenNow: { type: boolean }
        averageRating:
          type: number
          format: double
          nullable: true
          minimum: 1
          maximum: 5
        reviewCount: { type: integer, minimum: 0 }
        reviews:
          type: array
          maxItems: 50
          items: { $ref: '#/components/schemas/ReviewPublic' }

    ClinicDetailEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true], example: true }
        data: { $ref: '#/components/schemas/ClinicDetail' }

    ReviewPublic:
      type: object
      properties:
        id: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5, example: 5 }
        comment: { type: string, nullable: true, maxLength: 2000, example: Juda yaxshi xizmat }
        createdAt: { type: string, format: date-time }
        user:
          type: object
          properties:
            id: { type: string }
            name: { type: string, nullable: true }
            email:
              type: string
              description: Maskalangan email (masalan, `va***@example.com`).
              example: va***@example.com

    ReviewCreateRequest:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5, example: 5 }
        comment: { type: string, maxLength: 2000, example: Tez va sifatli xizmat }

    ReviewEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true], example: true }
        data: { $ref: '#/components/schemas/ReviewPublic' }

    # ───────── ADMIN SCHEMAS ─────────
    Pagination:
      type: object
      required: [total, page, pageSize]
      properties:
        total: { type: integer, minimum: 0, example: 42 }
        page: { type: integer, minimum: 1, example: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100, example: 20 }

