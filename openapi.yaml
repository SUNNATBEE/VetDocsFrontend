openapi: 3.0.3
info:
  title: Vet Clinic API
  version: 1.0.0
  summary: O'zbekiston bo'yicha veterinariya klinikalari uchun REST API.
  description: |
    Veterinariya klinikalarini joylashuv (radius) bo'yicha qidirish, ish vaqti
    (Asia/Tashkent), telefon, sharhlar va JWT autentifikatsiyasi (access +
    rotating refresh, reuse-detection) ta'minlovchi backend.

    ## Javob konvensiyasi

    Barcha javoblar yagona "envelope" formatida qaytadi:

    | Holat        | Shakl                                                                                       |
    | ------------ | ------------------------------------------------------------------------------------------- |
    | Muvaffaqiyat | `{ "success": true, "data": ... }`                                                          |
    | Xato         | `{ "success": false, "error": { "code", "message", "details?" }, "meta": { "requestId" } }` |

    ## Autentifikatsiya

    Himoyalangan endpointlarga `Authorization: Bearer <accessToken>` sarlavhasi
    bilan murojaat qiling. Access token muddati tugasa, `/auth/refresh` orqali
    yangilang — eski refresh token avtomatik bekor qilinadi (rotation). Bekor
    qilingan refresh qaytadan ishlatilsa, foydalanuvchining barcha sessiyalari
    bekor qilinadi (reuse-detection).

    ## Tezkor boshlash

    1. `POST /auth/register` yoki `POST /auth/login` orqali `accessToken` oling.
    2. Yuqoridagi **Authorize** tugmasini bosing va tokenni kiriting.
    3. Endpointni tanlang -> `Try it out` -> `Execute`.
    4. Response panelida `success: true` bo'lsa — hammasi yaxshi.

    ## cURL bilan tez sinash

    Quyidagi misollarda `BASE_URL` o'rniga muhitingizga mos manzilni qo'ying:

    - Production: `https://vetclinicbackend.up.railway.app/api/v1`
    - Lokal:      `http://localhost:4000/api/v1`

    ```bash
    BASE_URL="https://vetclinicbackend.up.railway.app/api/v1"
    curl "$BASE_URL/health"
    ```

    ## Postman'da 1 daqiqada test

    1. `New` -> `HTTP Request` -> `GET {BASE_URL}/health` -> `Send`. Servis tirik.
    2. `POST {BASE_URL}/auth/login` (`Body -> raw -> JSON`) -> `accessToken`ni nusxalang.
    3. Himoyalangan so'rovlarda `Authorization -> Bearer Token`ga shu tokenni qo'ying.
    4. Masalan, `GET {BASE_URL}/admin/dashboard` (admin token bilan).

    ## Rate limit

    Global limiter — `300 / 15 daqiqa`, `/auth/*` uchun alohida `40 / 15 daqiqa`.
    Limit oshib ketsa `429 RATE_LIMIT` (yoki `429 AUTH_RATE_LIMIT`) qaytadi va
    `RateLimit-*` sarlavhalarida qolgan kvota ko'rsatiladi.

  contact:
    name: Vet Clinic API Support
    email: yusupovsunnatbek32@gmail.com
    url: https://github.com/SUNNATBEE/VetDocsBakcend
  license:
    name: ISC
    url: https://opensource.org/licenses/ISC

externalDocs:
  description: Loyihaning manba kodi (GitHub)
  url: https://github.com/SUNNATBEE/VetDocsBakcend

servers:
  - url: https://vetclinicbackend.up.railway.app/api/v1
    description: Production (Railway)
  - url: http://localhost:4000/api/v1
    description: Lokal ishlab chiqish

tags:
  - name: Health
    description: Servis holati va versiya — monitoring va healthcheck uchun.
  - name: Auth
    description: Ro'yxatdan o'tish, kirish, token yangilash, chiqish.
  - name: Clinics
    description: Klinikalarni qidirish, batafsil ko'rish va sharh qoldirish.
  - name: Admin
    description: Faqat `ADMIN` roli uchun — boshqaruv endpointlari.

security: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Servis holati
      description: |
        Server tirikligini tekshiradi. Hech qanday autentifikatsiya talab qilinmaydi.
        Javobda: `status`, `service`, `version`, `startedAt`, `uptimeSec`, `docs`.

        ```bash
        curl "$BASE_URL/health"
        ```
      operationId: healthCheck
      responses:
        '200':
          description: Servis ishlamoqda.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  summary: Tirik servis
                  value:
                    success: true
                    data:
                      status: ok
                      service: vet-clinic-api
                      version: 1.0.0
                      startedAt: '2026-05-06T08:00:00.000Z'
                      uptimeSec: 1234
                      docs: https://vetclinicbackend.up.railway.app/docs

  /auth/register:
    post:
      tags: [Auth]
      summary: Ro'yxatdan o'tish
      description: |
        Yangi foydalanuvchi yaratadi va darhol `accessToken` + `refreshToken` qaytaradi.

        - `email` lowercased va trim qilinadi (ichkarida).
        - `password` 8..128 belgi.
        - Email band bo'lsa `409 EMAIL_EXISTS`.

        ```bash
        curl -X POST "$BASE_URL/auth/register" \
          -H "Content-Type: application/json" \
          -d '{"email":"vet@example.com","password":"StrongP@ss1","name":"Akmal"}'
        ```
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Foydalanuvchi yaratildi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensEnvelope'
              examples:
                created:
                  $ref: '#/components/examples/AuthTokensExample'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Tizimga kirish
      description: |
        Mavjud foydalanuvchi bilan tizimga kiradi. `email`/`password` noto'g'ri
        bo'lsa, ikki holat ham bitta xato kodini qaytaradi: `401 INVALID_CREDENTIALS`
        (foydalanuvchi enumeratsiyasiga yo'l qo'ymaslik uchun).

        ```bash
        curl -X POST "$BASE_URL/auth/login" \
          -H "Content-Type: application/json" \
          -d '{"email":"vet@example.com","password":"StrongP@ss1"}'
        ```
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Kirish muvaffaqiyatli.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensEnvelope'
              examples:
                ok:
                  $ref: '#/components/examples/AuthTokensExample'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413': { $ref: '#/components/responses/PayloadTooLarge' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Access tokenni yangilash (rotation + reuse-detection)
      description: |
        Access token muddati tugaganda yangi `access` + `refresh` juftligini oladi.

        - Eski `refreshToken` avtomatik bekor qilinadi (rotation).
        - Allaqachon bekor qilingan token qayta yuborilsa — barcha sessiyalar
          bekor qilinadi va `401 REFRESH_REUSED` qaytadi.
        - Muddati tugagan token: `401 REFRESH_EXPIRED`.

        ```bash
        curl -X POST "$BASE_URL/auth/refresh" \
          -H "Content-Type: application/json" \
          -d '{"refreshToken":"YOUR_REFRESH_TOKEN"}'
        ```
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Yangi access + refresh juftligi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensEnvelope'
              examples:
                rotated:
                  $ref: '#/components/examples/AuthTokensExample'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Token yaroqsiz, muddati tugagan yoki reuse-detection ishladi.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              examples:
                invalid:
                  summary: Yaroqsiz refresh token
                  value:
                    success: false
                    error: { code: INVALID_REFRESH, message: Refresh token yaroqsiz }
                    meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
                expired:
                  summary: Muddati tugagan
                  value:
                    success: false
                    error: { code: REFRESH_EXPIRED, message: Refresh token muddati tugagan }
                    meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
                reused:
                  summary: Bekor qilingan token qayta ishlatildi
                  value:
                    success: false
                    error:
                      code: REFRESH_REUSED
                      message: Refresh token qayta ishlatilgan, barcha sessiyalar bekor qilindi
                    meta: { requestId: 5d2c8b80-2e6a-4b1f-91f0-7c2c6b4f1abc }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Refresh sessiyasini bekor qilish
      description: |
        Best-effort logout: `refreshToken` yuborilsa, mos refresh sessiyasi bekor
        qilinadi. Body bo'sh bo'lsa ham `200 { ok: true }` qaytadi (token mavjudligini
        probing qilishga yo'l qo'ymaslik uchun).

        ```bash
        curl -X POST "$BASE_URL/auth/logout" \
          -H "Content-Type: application/json" \
          -d '{"refreshToken":"YOUR_REFRESH_TOKEN"}'
        ```
      operationId: authLogout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Har doim 200 (token bo'lmasa ham).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkEnvelope'
              examples:
                ok:
                  value: { success: true, data: { ok: true } }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /clinics/nearby:
    get:
      tags: [Clinics]
      summary: Radius bo'yicha yaqin klinikalar
      description: |
        Berilgan koordinata (`lat`, `lng`) atrofidagi klinikalarni masofa bo'yicha
        o'sish tartibida qaytaradi. Har bir element uchun `distanceKm`, `isOpenNow`,
        `todayHours`, `averageRating`, `reviewCount` qaytadi.

        ```bash
        curl "$BASE_URL/clinics/nearby?lat=41.31&lng=69.25&radiusKm=5"
        ```
      operationId: clinicsNearby
      parameters:
        - in: query
          name: lat
          required: true
          description: Kenglik (-90..90)
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          example: 41.31
        - in: query
          name: lng
          required: true
          description: Uzunlik (-180..180)
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          example: 69.25
        - in: query
          name: radiusKm
          required: false
          description: Radius (km), default 10, maksimum 200.
          schema:
            type: number
            format: double
            default: 10
            minimum: 0.01
            maximum: 200
          example: 5
      responses:
        '200':
          description: Klinikalar (masofa bo'yicha o'sib boruvchi).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicsNearbyEnvelope'
              examples:
                ok:
                  summary: Toshkent markazidan 5 km ichida
                  value:
                    success: true
                    data:
                      clinics:
                        - id: clu1xv8z00000abcd1234efgh
                          name: Vet Service Chilonzor
                          phone: '+998 71 123 45 67'
                          address: Chilonzor-9, Toshkent
                          city: Toshkent
                          latitude: 41.285
                          longitude: 69.204
                          distanceKm: 1.27
                          isOpenNow: true
                          todayHours: { open: '09:00', close: '19:00' }
                          averageRating: 4.6
                          reviewCount: 12
                        - id: clu1xv8z00001abcd1234efgh
                          name: Zoo Vet Klinikasi Yunusobod
                          phone: '+998 71 234 56 78'
